; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; This safely tells the compiler to use 26MHz timing logic for this project
board_build.f_xtal = 26000000

; Slows down the flasher tool to bypass cable noise/corruption
upload_speed = 115200
monitor_speed = 115200

; Prevent the serial monitor from toggling DTR/RTS after upload,
; which avoids extra resets when the monitor opens
monitor_dtr = 0
monitor_rts = 0

; =========================================================================
; EMERGENCY TROUBLESHOOTING PARAMETERS (POWER / CABLE NOISE FIXES)
; If uploads crash or fail midway through, remove the leading semicolons below:
; =========================================================================
; upload_flags =
;     --flash_size=detect
;     --no-stub
; =========================================================================


lib_deps = 
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
	adafruit/DHT sensor library@^1.4.7
